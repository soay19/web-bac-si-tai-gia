<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Lịch hẹn sắp tới - THAT Clinic</title>

	<link rel="stylesheet" href="../assets/css/base.css">
	<link rel="stylesheet" href="../assets/css/layout.css">
	<link rel="stylesheet" href="../assets/css/doctor-requests.css">
</head>

<body class="doctor-requests-page">
	<header class="site-header">
		<div class="container header-wrapper">
			<a class="brand" href="./my-appointments.html">
				<span class="brand-mark"></span>
				<span class="brand-name">THAT Clinic</span>
			</a>

			<nav class="main-nav">
				<a href="./my-appointments.html" class="nav-link nav-highlight">Lịch hẹn</a>
				<a href="./doctor-requests.html" class="nav-link">Lịch hẹn đề xuất</a>
				<a href="./profile.html" class="nav-link">Hồ sơ</a>
				<a href="../guest/login.html" class="nav-link">Đăng xuất</a>
			</nav>
		</div>
	</header>

	<main class="doctor-requests-main">
		<section class="page-banner">
			<div class="container page-banner-inner">
				<h1>Lịch hẹn sắp tới</h1>
			</div>
		</section>

		<section class="container requests-content">
			<div class="appointment-filter" aria-label="Bộ lọc thời gian lịch hẹn">
				<div class="filter-field">
					<label for="doctor-filter-date-from">Từ ngày</label>
					<input type="date" id="doctor-filter-date-from">
				</div>
				<div class="filter-field">
					<label for="doctor-filter-date-to">Đến ngày</label>
					<input type="date" id="doctor-filter-date-to">
				</div>
				<div class="filter-field">
					<label for="doctor-filter-time-from">Từ giờ</label>
					<input type="time" id="doctor-filter-time-from">
				</div>
				<div class="filter-field">
					<label for="doctor-filter-time-to">Đến giờ</label>
					<input type="time" id="doctor-filter-time-to">
				</div>
				<button type="button" id="doctor-filter-reset" class="filter-reset-btn">Xoá lọc</button>
				<p class="filter-result" id="doctor-filter-result" aria-live="polite"></p>
			</div>

			<div class="requests-list" aria-live="polite"></div>

		</section>
	</main>

	<script src="../assets/js/db-bridge.js"></script>
	<script src="../assets/js/appointments-flow.js"></script>
</body>

</html>
