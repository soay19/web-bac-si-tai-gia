<!doctype html>
<html lang="vi">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Đăng ký</title>
		<link rel="stylesheet" href="../assets/css/base.css" />
		<link rel="stylesheet" href="../assets/css/guest.css" />
	</head>
	<body class="login-page">
		<a href="index.html" class="logo">
			<img src="../assets/img/logo.png" alt="Logo" />
		</a>

		<main class="login-card">
			<h1>Đăng ký</h1>
			<p>Tạo tài khoản mới</p>

			<form id="signupForm">
				<input id="signupFullName" type="text" placeholder="Họ tên" required />
				<input id="signupEmail" type="email" placeholder="Gmail" required />
				<input id="signupPhone" type="tel" placeholder="Số điện thoại" />
				<input id="signupPassword" type="password" placeholder="Mật khẩu" required />
				<input id="signupConfirmPassword" type="password" placeholder="Xác nhận mật khẩu" required />
				<button type="submit">Tạo tài khoản</button>
			</form>

			<p class="signup">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
		</main>
		<script src="../assets/js/auth-flow.js"></script>
	</body>
</html>
