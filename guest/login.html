<!doctype html>
<html lang="vi">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Đăng nhập</title>
		<link rel="stylesheet" href="../assets/css/base.css" />
		<link rel="stylesheet" href="../assets/css/guest.css" />
	</head>
	<body class="login-page">
		<a href="index.html" class="logo">
			<img src="../assets/img/logo.png" alt="Logo"/>
		</a>

		<main class="login-card">
			<h1>Đăng nhập</h1>

			<form id="loginForm">
				<input id="loginIdentifier" type="text" placeholder="Gmail hoặc số điện thoại" required />
				<input id="loginPassword" type="password" placeholder="Mật khẩu" required />
				<select id="loginRole" required>
					<option value="user">Người dùng</option>
					<option value="doctor">Bác sĩ</option>
					<option value="admin">Quản trị viên</option>
				</select>
				<a class="forgot" href="#">Quên mật khẩu?</a>
				<button type="submit">Tiếp tục</button>
			</form>

			<p class="signup">Chưa có tài khoản? <a href="signup.html">Đăng ký</a></p>
		</main>
		<script src="../assets/js/auth-flow.js"></script>
	</body>
</html>
