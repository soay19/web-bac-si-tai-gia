<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Thêm bác sĩ - THAT Clinic</title>

	<link rel="stylesheet" href="../assets/css/base.css">
	<link rel="stylesheet" href="../assets/css/layout.css">
	<link rel="stylesheet" href="../assets/css/admin.css">
</head>

<body class="admin-page">
	<header class="site-header">
		<div class="container header-wrapper">
			<a class="brand" href="./add-doctor.html">
				<span class="brand-mark"></span>
				<span class="brand-name">THAT Clinic</span>
			</a>

			<nav class="main-nav admin-nav">
				<a href="./add-doctor.html" class="nav-link nav-highlight">Thêm bác sĩ</a>
				<a href="./delete-doctor.html" class="nav-link">Xóa bác sĩ</a>
				<a href="./edit-doctor.html" class="nav-link">Sửa bác sĩ</a>
				<a href="./manage-specialties.html" class="nav-link">Quản lý chuyên khoa</a>
				<a href="./view-appointments.html" class="nav-link">Xem lịch hẹn</a>
				<a href="./doctor-stats.html" class="nav-link">Thống kê</a>
				<a href="../guest/login.html" class="nav-link">Đăng xuất</a>
			</nav>
		</div>
	</header>

	<main class="admin-main">
		<section class="container">
			<div class="admin-actions">
				<a class="admin-action-link" href="./edit-doctor.html">Sửa bác sĩ</a>
			</div>

			<div class="admin-form-card">
				<div class="card-header">
					<h1>Tạo bác sĩ</h1>
					<button type="button" class="card-close" aria-label="Đóng">×</button>
				</div>

				<form class="doctor-form" action="#" method="post" id="doctor-create-form">
					<div class="field-grid two-cols">
						<div class="field-group">
							<label for="doctor-name">Tên bác sĩ</label>
							<input id="doctor-name" name="doctorName" type="text" placeholder="Tên bác sĩ" required />
						</div>

						<div class="field-group">
							<label for="specialty">Chuyên khoa</label>
							<div class="select-wrap">
								<select id="specialty" name="specialty" required>
									<option value="">Chọn chuyên khoa</option>
								</select>
							</div>
						</div>
					</div>

					<div class="field-grid two-cols">
						<div class="field-group">
							<label for="phone-number">Số điện thoại</label>
							<input id="phone-number" name="phone" type="tel" placeholder="Số điện thoại" required />
						</div>

						<div class="field-group">
							<label for="doctor-password">Mật khẩu</label>
							<input id="doctor-password" name="doctorPassword" type="password" placeholder="Mật khẩu đăng nhập" required />
						</div>
					</div>

					<div class="field-row">
						<label for="email">Gmail</label>
						<input id="email" name="email" type="email" placeholder="Nhập Gmail" required />
					</div>

					<div class="field-row">
						<label for="avatar-url">Ảnh đại diện (URL, tuỳ chọn)</label>
						<input id="avatar-url" name="avatarUrl" type="url" placeholder="https://..." />
					</div>

					<p id="doctor-feedback" role="status" aria-live="polite"></p>

					<div class="form-action">
						<button type="submit" class="create-btn">Thêm bác sĩ</button>
					</div>
				</form>
			</div>
		</section>
	</main>

	<script src="../assets/js/db-bridge.js"></script>
	<script src="../assets/js/admin-tools.js"></script>
</body>

</html>
