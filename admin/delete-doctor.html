<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xóa bác sĩ - THAT Clinic</title>

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/doctors.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>

<body class="doctors-page admin-page delete-page">
  <header class="site-header">
    <div class="container header-wrapper">
      <a class="brand" href="./add-doctor.html">
        <span class="brand-mark"></span>
        <span class="brand-name">THAT Clinic</span>
      </a>

      <nav class="main-nav admin-nav">
        <a href="./add-doctor.html" class="nav-link">Thêm bác sĩ</a>
        <a href="./delete-doctor.html" class="nav-link nav-highlight">Xóa bác sĩ</a>
        <a href="./edit-doctor.html" class="nav-link">Sửa bác sĩ</a>
        <a href="./manage-specialties.html" class="nav-link">Quản lý chuyên khoa</a>
        <a href="./view-appointments.html" class="nav-link">Xem lịch hẹn</a>
        <a href="./doctor-stats.html" class="nav-link">Thống kê</a>
        <a href="../guest/login.html" class="nav-link">Đăng xuất</a>
      </nav>
    </div>
  </header>

  <main class="main-layout doctors-layout">
    <div class="content-wrapper doctors-content">
      <div class="main-content">
        <div class="content-header">
          <h2 class="section-title">Quản lý bác sĩ</h2>
          <div class="search-box">
            <input type="text" id="doctor-delete-search" placeholder="Tìm kiếm bác sĩ..." />
            <button class="btn-search" id="doctor-delete-search-btn" type="button">🔍</button>
          </div>
        </div>

        <div class="doctor-filter-toolbar" aria-label="Bộ lọc bác sĩ">
          <button type="button" class="doctor-filter-chip is-active" data-doctor-filter="all">Tất cả bác sĩ</button>
          <button type="button" class="doctor-filter-chip" data-doctor-filter="featured">Bác sĩ VIP</button>
        </div>

        <nav class="specialty-nav" id="doctor-delete-specialty-nav" aria-label="Điều hướng chuyên khoa"></nav>
        <p id="doctor-delete-feedback" role="status" aria-live="polite"></p>
        <div id="doctor-delete-sections"></div>
      </div>
    </div>
  </main>

  <script src="../assets/js/db-bridge.js"></script>
  <script src="../assets/js/admin-tools.js"></script>
</body>

</html>
