<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="../assets/css/base.css">

</head>

<body class="admin-page">
  <header class="site-header">
    <div class="container header-wrapper">
      <a class="brand" href="./add-doctor.html">
        <span class="brand-mark"></span>
        <span class="brand-name">THAT Clinic</span>
      </a>

      <nav class="main-nav admin-nav">
        <a href="./add-doctor.html" class="nav-link">Thêm bác sĩ</a>

      <div class="admin-panel">

        <div class="chip-list" id="specialty-list"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <div class="footer-brand">
        <div class="brand-mark"></div>
        <div>
          <h4>THAT Clinic</h4>
          <p>Đặt lịch khám tại nhà tiện lợi, an toàn và nhanh chóng.</p>
        </div>
      </div>
    </div>

  <script src="../assets/js/db-bridge.js"></script>
