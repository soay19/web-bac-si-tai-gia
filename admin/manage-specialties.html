<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý chuyên khoa - THAT Clinic</title>

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <style>
    .sp-main { padding: 30px 0 50px; }

    .sp-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; margin-bottom: 28px; flex-wrap: wrap;
    }
    .sp-header h1 { font-size: 28px; font-weight: 700; color: #0f172a; margin: 0; }

    .sp-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* ── FORM CARD ── */
    .sp-form-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      border: 1px solid #f1f5f9;
      padding: 24px;
      position: sticky;
      top: 100px;
    }
    .sp-form-card h2 {
      margin: 0 0 18px;
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sp-form-card h2::before {
      content: "";
      width: 4px;
      height: 22px;
      border-radius: 2px;
      background: linear-gradient(180deg, #3b82f6, #60a5fa);
    }
    .sp-field {
      margin-bottom: 14px;
    }
    .sp-field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .sp-field input {
      width: 100%;
      height: 44px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 14px;
      color: #0f172a;
      background: #f8fafc;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      outline: none;
    }
    .sp-field input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
      background: #ffffff;
    }
    .sp-field input::placeholder { color: #94a3b8; }

    .sp-form-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .sp-btn-submit {
      flex: 1;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #ffffff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .sp-btn-submit:hover {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
    }
    .sp-btn-cancel {
      height: 44px;
      padding: 0 18px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      background: #ffffff;
      color: #475569;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .sp-btn-cancel:hover {
      border-color: #94a3b8;
      background: #f8fafc;
    }

    .sp-feedback {
      margin-top: 12px;
      min-height: 20px;
      font-size: 13px;
      font-weight: 600;
      padding: 0;
    }

    /* ── LIST CARD ── */
    .sp-list-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      border: 1px solid #f1f5f9;
      overflow: hidden;
    }
    .sp-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid #f1f5f9;
    }
    .sp-list-header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sp-list-header h2::before {
      content: "";
      width: 4px;
      height: 22px;
      border-radius: 2px;
      background: linear-gradient(180deg, #10b981, #34d399);
    }
    .sp-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 13px;
      font-weight: 700;
    }

    .sp-list-body {
      padding: 8px;
    }

    .sp-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      transition: background-color 0.15s ease;
    }
    .sp-item:hover {
      background: #f8fafc;
    }
    .sp-item + .sp-item {
      border-top: 1px solid #f1f5f9;
    }

    .sp-item-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #e0f2fe, #bae6fd);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .sp-item-content {
      flex: 1;
      min-width: 0;
    }
    .sp-item-name {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
      margin: 0 0 2px;
    }
    .sp-item-desc {
      font-size: 13px;
      color: #64748b;
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sp-item-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .sp-item-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .sp-btn-edit {
      background: #e0f2fe;
      color: #0369a1;
    }
    .sp-btn-edit:hover {
      background: #bae6fd;
    }
    .sp-btn-delete {
      background: #fee2e2;
      color: #dc2626;
    }
    .sp-btn-delete:hover {
      background: #fecaca;
    }

    .sp-empty {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .sp-grid {
        grid-template-columns: 1fr;
      }
      .sp-form-card {
        position: static;
      }
    }
  </style>
</head>

<body class="admin-page">
  <header class="site-header">
    <div class="container header-wrapper">
      <a class="brand" href="./add-doctor.html">
        <span class="brand-mark"></span>
        <span class="brand-name">THAT Clinic</span>
      </a>

      <nav class="main-nav admin-nav">
        <a href="./add-doctor.html" class="nav-link">Thêm bác sĩ</a>
        <a href="./delete-doctor.html" class="nav-link">Xóa bác sĩ</a>
        <a href="./edit-doctor.html" class="nav-link">Sửa bác sĩ</a>
        <a href="./manage-specialties.html" class="nav-link nav-highlight">Quản lý chuyên khoa</a>
        <a href="./view-appointments.html" class="nav-link">Xem lịch hẹn</a>
        <a href="./doctor-stats.html" class="nav-link">Thống kê</a>
        <a href="../guest/login.html" class="nav-link">Đăng xuất</a>
      </nav>
    </div>
  </header>

  <main class="sp-main">
    <section class="container">
      <div class="sp-header">
        <h1>Quản lý chuyên khoa</h1>
      </div>

      <div class="sp-grid">
        <!-- FORM -->
        <div class="sp-form-card">
          <h2>Thêm hoặc cập nhật chuyên khoa</h2>
          <form id="specialty-form">
            <div class="sp-field">
              <label for="specialty-name">Tên chuyên khoa</label>
              <input id="specialty-name" type="text" placeholder="VD: Nội khoa, Tim mạch..." required />
            </div>
            <div class="sp-field">
              <label for="specialty-description">Mô tả</label>
              <input id="specialty-description" type="text" placeholder="Mô tả ngắn về chuyên khoa..." required />
            </div>
            <div class="sp-form-actions">
              <button type="submit" class="sp-btn-submit">Thêm chuyên khoa</button>
              <button type="button" id="specialty-cancel-edit" class="sp-btn-cancel" hidden>Huỷ</button>
            </div>
          </form>
          <p id="specialty-feedback" class="sp-feedback" role="status" aria-live="polite"></p>
        </div>

        <!-- LIST -->
        <div class="sp-list-card">
          <div class="sp-list-header">
            <h2>Danh sách chuyên khoa</h2>
            <span class="sp-count" id="specialty-count">0</span>
          </div>
          <div class="sp-list-body" id="specialty-list"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="../assets/js/db-bridge.js"></script>
  <script src="../assets/js/admin-tools.js"></script>
</body>

</html>
